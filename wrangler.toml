name = "image-background-remover"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

[build]
command = "npx @cloudflare/next-on-pages"

[build.environment]
NODE_VERSION = "20"

[[services]]
binding = "NEXTAUTH_SECRET"
type = "secret"

[[services]]
binding = "GOOGLE_CLIENT_ID"
type = "secret"

[[services]]
binding = "GOOGLE_CLIENT_SECRET"
type = "secret"

[[services]]
binding = "NEXTAUTH_URL"
type = "secret"

[[services]]
binding = "REMOVEBG_API_KEY"
type = "secret"